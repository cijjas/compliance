services:
  postgres:
    image: postgres:16-alpine
    container_name: complif-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-complif}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  format-validation:
    build:
      context: ./microservice-format-validation
      dockerfile: Dockerfile
    container_name: complif-format-validation
    restart: unless-stopped
    environment:
      PORT: 3001
    expose:
      - '3001'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: complif-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      format-validation:
        condition: service_started
    environment:
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-complif}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      FORMAT_VALIDATION_URL: http://format-validation:3001
    ports:
      - '8080:8080'
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
    container_name: complif-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '3000:3000'

volumes:
  postgres_data:
  uploads:
